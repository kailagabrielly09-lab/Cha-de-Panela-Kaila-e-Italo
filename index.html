<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <!-- 📱 faz o site adaptar ao celular -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Chá de Panela 💛</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .box {
      background: white;
      padding: 40px;
      border-radius: 20px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h1 {
      color: #d48a7c;
      margin-bottom: 10px;
    }

    p {
      color: #666;
      margin-bottom: 15px;
    }

    .date, .time {
      margin: 8px 0;
      font-size: 16px;
      color: #d48a7c;
      font-weight: bold;
    }

    .date span,
    .time span {
      color: #666;
      font-weight: normal;
      background: #fff1e6;
      padding: 3px 8px;
      border-radius: 6px;
    }

    .icons {
      font-size: 30px;
      margin-bottom: 15px;
      display: flex;
      justify-content: center;
      gap: 10px;
      animation: float 2s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }

    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
      color: white;
      background: #d48a7c;
      transition: 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      background: #c0766a;
      transform: scale(1.05);
    }

    .btn::after {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.3);
      transform: skewX(-20deg);
      transition: 0.5s;
    }

    .btn:hover::after {
      left: 120%;
    }

    /* 📱 AJUSTE PARA CELULAR */
    @media (max-width: 600px) {
      .box {
        padding: 25px;
        width: 95%;
      }

      h1 {
        font-size: 28px;
      }

      p {
        font-size: 16px;
      }

      .btn {
        font-size: 18px;
        padding: 14px;
      }

      .icons {
        font-size: 34px;
      }
    }

  </style>
</head>

<body>

  <div class="box">

    <!-- 🍳 ícones cozinha -->
    <div class="icons">
      <span>🍲</span>
      <span>🥄</span>
      <span>🍳</span>
      <span>🍴</span>
    </div>

    <h1>Chá de Panela</h1>

    <p>Convidamos você para celebrar com a gente!</p>

    <p class="date">📅 Data: <span>31 / 05 / 2026</span></p>
    <p class="time">⏰ Horário: <span>13 : 00</span></p>

    <a class="btn"
       href="https://docs.google.com/forms/d/e/1FAIpQLSduVuvijU4CWw61hwZbQbzYlwT27y8VLNwFVWulL2q5pBXjpw/viewform?usp=publish-editor"
       target="_blank">
      Confirmar presença
    </a>

    <a class="btn"
       href="https://maps.app.goo.gl/YY9zJUg9F1PW1tAj7"
       target="_blank">
      Localização
    </a>

  </div>

</body>
</html>
